common: &default_settings
  license_key: '<YOUR_NEW_RELIC_LICENSE_KEY>'
  agent_enabled: true
  app_name: Ride Hailing API
  high_security: false
  enable_auto_app_naming: false
  enable_auto_transaction_naming: true
  log_level: info

  application_logging:
    enabled: true
    forwarding:
      enabled: true
    metrics:
      enabled: true

  distributed_tracing:
    enabled: true

  transaction_tracer:
    enabled: true
    record_sql: obfuscated
    explain_enabled: true

  error_collector:
    enabled: true
    ignore_status_codes: 404

development:
  <<: *default_settings
  app_name: Ride Hailing API (Development)

production:
  <<: *default_settings
